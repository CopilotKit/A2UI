<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI Visual Parity - React</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #ffffff;
      }
      #root {
        padding: 16px;
      }
      .fixture-container {
        display: inline-block;
      }

      /* Reset heading styles to inherit from parent (match Shadow DOM behavior) */
      .a2ui-surface section h1,
      .a2ui-surface section h2,
      .a2ui-surface section h3,
      .a2ui-surface section h4,
      .a2ui-surface section h5,
      .a2ui-surface section h6 {
        font-size: inherit;
        font-weight: inherit;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
