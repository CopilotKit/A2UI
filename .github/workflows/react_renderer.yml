name: React renderer

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'renderers/angular/**'
      - 'renderers/flutter/**'
      - 'renderers/lit/**'
      - 'samples/agent/adk/**'
  pull_request:
    paths-ignore:
      - 'renderers/angular/**'
      - 'renderers/flutter/**'
      - 'renderers/lit/**'
      - 'samples/agent/adk/**'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          npm ci
          npm run build

      - name: Install React renderer deps
        working-directory: ./renderers/react
        run: npm ci

      - name: Build React renderer
        working-directory: ./renderers/react
        run: npm run build

      - name: Test React renderer
        working-directory: ./renderers/react
        run: npm test

  build-and-test-demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          npm ci
          npm run build

      - name: Install React renderer deps
        working-directory: ./renderers/react
        run: npm ci

      - name: Build React Demo
        working-directory: ./renderers/react
        run: npm run build:demo

      - name: Test React Demo
        working-directory: ./renderers/react
        run: npm run test:demo

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Build web_core dependency
        working-directory: ./renderers/web_core
        run: |
          npm ci
          npm run build

      - name: Install React renderer deps
        working-directory: ./renderers/react
        run: npm ci

      - name: Build React renderer and its dependencies
        working-directory: ./renderers/react
        run: npm run lint

