<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI Visual Parity - Lit</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #ffffff;
      }
      #app {
        padding: 16px;
      }
      .fixture-container {
        display: inline-block;
      }

      /* Reset heading styles inside a2ui-text Shadow DOM (needed for visual parity) */
      /* Note: This only works if the Shadow DOM allows external styling via ::part or inheritable properties */

      /* Color palette - must match React's defaultPalette for visual parity */
      :root, a2ui-surface, a2ui-text, a2ui-button, a2ui-card, a2ui-row, a2ui-column,
      a2ui-checkbox, a2ui-textfield, a2ui-slider, a2ui-divider, a2ui-icon, a2ui-list {
        /* Neutral palette */
        --n-100: #ffffff;
        --n-99: #fcfcfc;
        --n-98: #f9f9f9;
        --n-95: #f1f1f1;
        --n-90: #e2e2e2;
        --n-80: #c6c6c6;
        --n-70: #ababab;
        --n-60: #919191;
        --n-50: #777777;
        --n-40: #5e5e5e;
        --n-35: #525252;
        --n-30: #474747;
        --n-25: #3b3b3b;
        --n-20: #303030;
        --n-15: #262626;
        --n-10: #1b1b1b;
        --n-5: #111111;
        --n-0: #000000;

        /* Primary palette */
        --p-100: #ffffff;
        --p-99: #fffbff;
        --p-98: #fcf8ff;
        --p-95: #f2efff;
        --p-90: #e1e0ff;
        --p-80: #c0c1ff;
        --p-70: #a0a3ff;
        --p-60: #8487ea;
        --p-50: #6a6dcd;
        --p-40: #5154b3;
        --p-35: #4447a6;
        --p-30: #383b99;
        --p-25: #2c2e8d;
        --p-20: #202182;
        --p-15: #131178;
        --p-10: #06006c;
        --p-5: #03004d;
        --p-0: #000000;

        /* Secondary palette */
        --s-100: #ffffff;
        --s-99: #fffbff;
        --s-98: #fcf8ff;
        --s-95: #f2efff;
        --s-90: #e2e0f9;
        --s-80: #c6c4dd;
        --s-70: #aaa9c1;
        --s-60: #8f8fa5;
        --s-50: #75758b;
        --s-40: #5d5c72;
        --s-35: #515165;
        --s-30: #454559;
        --s-25: #393a4d;
        --s-20: #2e2f42;
        --s-15: #242437;
        --s-10: #191a2c;
        --s-5: #0f0f21;
        --s-0: #000000;

        /* Error palette */
        --e-100: #ffffff;
        --e-99: #fffbff;
        --e-98: #fff8f7;
        --e-95: #ffedea;
        --e-90: #ffdad6;
        --e-80: #ffb4ab;
        --e-70: #ff897d;
        --e-60: #ff5449;
        --e-50: #de3730;
        --e-40: #ba1a1a;
        --e-10: #410001;
        --e-0: #000000;

        /* Font family */
        --font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        --font-family-flex: "Helvetica Neue", Helvetica, Arial, sans-serif;
        --default-font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;

        /* Color scheme */
        --color-scheme: light;
        color-scheme: light;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
