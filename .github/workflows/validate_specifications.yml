name: Validate A2UI specification examples

on:
  push:
    branches: [ main ]
    paths:
      - 'specification/**/json/**'
      - '.github/workflows/validate_specifications.yml'
      - 'specification/scripts/validate.py'
  pull_request:
    paths:
      - 'specification/**/json/**'
      - '.github/workflows/validate_specifications.yml'
      - 'specification/scripts/validate.py'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: ./specification/v0_9/test
        run: pnpm install

      - name: Run validation script
        run: python3 specification/scripts/validate.py
