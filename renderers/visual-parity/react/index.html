<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2UI Visual Parity - React</title>
    <!-- Material Symbols font for icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #ffffff;
      }
      #root {
        padding: 16px;
      }
      .fixture-container {
        display: inline-block;
        min-width: 200px; /* Ensure width for percentage-based components like dividers */
      }

      /* Reset heading styles to inherit from parent (match Shadow DOM behavior) */
      /* Note: margins are controlled by theme utility classes (layout-mt-*, layout-mb-*) */
      /* so we only reset font properties here, not margins */
      .a2ui-surface section h1,
      .a2ui-surface section h2,
      .a2ui-surface section h3,
      .a2ui-surface section h4,
      .a2ui-surface section h5,
      .a2ui-surface section h6 {
        font-size: inherit;
        font-weight: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
